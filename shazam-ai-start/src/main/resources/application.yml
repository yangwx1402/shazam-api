spring:
  application:
    name: shazam-ai-start

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-your-dashscope-api-key}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        completions-path: /compatible-mode/v1/chat/completions
        options:
          model: ${OPENAI_MODEL:qwen-plus}
          temperature: ${OPENAI_TEMPERATURE:0.7}

shazam:
  agent:
    enabled: true
    provider: ${AGENT_PROVIDER:openai}
    model: ${AGENT_MODEL:gpt-4o-mini}
    temperature: ${AGENT_TEMPERATURE:0.7}
    max-tokens: ${AGENT_MAX_TOKENS:2048}

    # ReAct 推理配置
    react:
      enabled: true
      max-iterations: 10
      include-trace: true

    # 记忆配置
    memory:
      enabled: true
      max-messages: 20

    # 工具调用配置
    tools:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.shazam.ai: ${LOG_LEVEL_SHAZAM:DEBUG}
    org.springframework.ai: ${LOG_LEVEL_AI:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
