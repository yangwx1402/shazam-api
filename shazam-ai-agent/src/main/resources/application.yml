spring:
  application:
    name: shazam-ai-agent

  # AI 配置 - 从环境变量读取敏感信息
  ai:
    openai:
      # 从环境变量 OPENAI_API_KEY 读取
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: ${OPENAI_TEMPERATURE:0.7}

# Shazam Agent 配置
shazam:
  agent:
    enabled: true
    # 提供商类型：openai, ollama, azure
    provider: ${AGENT_PROVIDER:openai}
    # 模型名称
    model: ${AGENT_MODEL:gpt-4o-mini}
    # 温度参数 (0.0 - 2.0)
    temperature: ${AGENT_TEMPERATURE:0.7}
    # 最大 token 数
    max-tokens: ${AGENT_MAX_TOKENS:2048}
    
    # 工具调用配置
    tools:
      enabled: true
      packages:
        - com.shazam.agent.tools
    
    # 记忆配置
    memory:
      enabled: true
      max-size: 100

# 服务器配置
server:
  port: ${SERVER_PORT:8080}

# 日志配置
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.shazam.agent: ${LOG_LEVEL_AGENT:DEBUG}
    org.springframework.ai: ${LOG_LEVEL_AI:INFO}
